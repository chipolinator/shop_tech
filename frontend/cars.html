<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopTech | Машины</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script>
    try {
      if (!window.localStorage.getItem("shoptech_user_token") && !window.localStorage.getItem("shoptech_admin_token")) {
        window.location.replace("/index.html?mode=login");
      }
    } catch {
      window.location.replace("/index.html?mode=login");
    }
  </script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <p class="brand">ShopTech API Demo</p>
      <nav class="nav-links" aria-label="Навигация" hidden>
        <a class="nav-link" href="/index.html">Аккаунт</a>
        <a class="nav-link active" href="/cars.html" data-nav-role="user" hidden>Машины</a>
        <a class="nav-link" href="/cart.html" data-nav-role="user" hidden>Корзина</a>
        <a class="nav-link" href="/admin.html" data-nav-role="admin" hidden>Админ</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="container">
      <h1 class="page-title">Каталог</h1>

      <section class="card catalog-search-card">
        <form
          class="catalog-search-form"
          data-catalog-search
          role="search"
        >
          <input
            id="catalog-search"
            name="search"
            type="search"
            autocomplete="off"
            placeholder="Поиск по объявлениям"
            aria-label="Поиск"
          >
        </form>
      </section>

      <section class="card brand-filter" aria-labelledby="brand-filter-title">
        <div class="brand-filter-header">
          <div>
            <h2 id="brand-filter-title">Фильтр по марке</h2>
          </div>
        </div>
        <div id="brand-filters" class="filter-chips" role="group" aria-label="Список марок"></div>
      </section>

      <section id="cars-list" class="cars-grid" aria-live="polite"></section>
      <nav
        id="catalog-pagination"
        class="catalog-pagination"
        aria-label="Навигация по страницам каталога"
        hidden
      ></nav>
    </section>
  </main>

  <footer class="footer">
    <p>team monopoliks</p>
  </footer>

  <script src="/static/auth.js"></script>
  <script src="/static/cars.js"></script>
</body>
</html>
